server:
  port: 8080

spring:
  application:
    name: docpilot-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/docpilot_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:1712}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

app:
  jwt:
    # 256-bit Hex Key for HS256 signature
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    # Token expiration time: 24 hours in milliseconds
    expiration-ms: 86400000
  ocr:
    mock: ${APP_OCR_MOCK:true}
    tessdata-path: ${APP_OCR_TESSDATA_PATH:C:/Program Files/Tesseract-OCR/tessdata}
  storage:
    upload-dir: ${APP_STORAGE_UPLOAD_DIR:./storage/documents}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: gemini-1.5-flash
  pinecone:
    api-key: ${PINECONE_API_KEY:}
    index-url: ${PINECONE_INDEX_URL:}
    mock: true

# Swagger OpenAPI UI Configuration
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    org:
      springframework:
        security: INFO
      hibernate:
        SQL: DEBUG
